services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    restart: unless-stopped
    networks:
      - app

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-test.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge
